<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'SF Mono','Fira Code','Cascadia Code',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7768e"/>
      <stop offset="60%" stop-color="#e0af68"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect x="20" y="20" width="760" height="480" rx="10" fill="url(#bg)" stroke="#3b4261" stroke-width="1"/>

  <!-- Title bar dots -->
  <circle cx="50" cy="45" r="6" fill="#f7768e"/>
  <circle cx="70" cy="45" r="6" fill="#e0af68"/>
  <circle cx="90" cy="45" r="6" fill="#9ece6a"/>

  <text x="400" y="50" text-anchor="middle" fill="#565f89" font-size="12" font-family="sans-serif">bash</text>

  <!-- Line 1: prompt -->
  <text x="40" y="90" fill="#7aa2f7" font-size="13">$</text>
  <text x="55" y="90" fill="#a9b1d6" font-size="13">npx snapdiff-cli init --yes</text>

  <!-- Line 2-5: init output -->
  <text x="40" y="115" fill="#73daca" font-size="13">? ??? snapdiff.config.json</text>
  <text x="40" y="135" fill="#73daca" font-size="13">? ??? .gitignore</text>
  <text x="40" y="160" fill="#73daca" font-size="13">? https://example.com ?? ?????</text>

  <!-- Line 6: prompt -->
  <text x="40" y="195" fill="#7aa2f7" font-size="13">$</text>
  <text x="55" y="195" fill="#a9b1d6" font-size="13"># ?????...</text>

  <!-- Line 7: prompt -->
  <text x="40" y="225" fill="#7aa2f7" font-size="13">$</text>
  <text x="55" y="225" fill="#a9b1d6" font-size="13">npx snapdiff-cli diff</text>

  <!-- Separator -->
  <line x1="40" y1="245" x2="760" y2="245" stroke="#3b4261" stroke-width="1"/>

  <!-- Diff output -->
  <text x="40" y="270" fill="#a9b1d6" font-size="13">?????? 2 ???...</text>

  <!-- Result 1 -->
  <text x="40" y="295" fill="#73daca" font-size="13">? homepage ?? ??? (?? 0%)</text>

  <!-- Result 2 - failed -->
  <text x="40" y="320" fill="#f7768e" font-size="13">? pricing</text>

  <!-- Visual bar for diff -->
  <rect x="55" y="332" width="8" height="8" rx="2" fill="#f7768e"/>
  <rect x="63" y="332" width="2" height="8" rx="1" fill="#3b4261"/>
  <text x="78" y="340" fill="#f7768e" font-size="13">0.3% (142 pixels)</text>
  <text x="40" y="358" fill="#565f89" font-size="12">?? diff ?: .snapdiff/diffs/pricing-1712345678-diff.png</text>
  <text x="40" y="376" fill="#7aa2f7" font-size="12">?????????: npx snapdiff approve pricing</text>

  <!-- Summary -->
  <line x1="40" y1="395" x2="760" y2="395" stroke="#3b4261" stroke-width="1"/>
  <text x="40" y="418" fill="#a9b1d6" font-size="13">?? ??: 2 ???, 1 ??, 1 ??, 0 ??</text>
  <text x="40" y="441" fill="#565f89" font-size="12">?? HTML ??: .snapdiff/reports/report-1712345678.html</text>

  <!-- Prompt for next -->
  <text x="40" y="475" fill="#7aa2f7" font-size="13">$</text>
  <text x="55" y="475" fill="#565f89" font-size="13">_</text>
</svg>
