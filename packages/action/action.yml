name: 'snapdiff'
description: 'Visual regression testing ? compare screenshots with Playwright'
author: 'zixuan57'
branding:
  icon: 'camera'
  color: 'blue'
inputs:
  threshold:
    description: '???????'
    default: '0.1'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Playwright browsers
      shell: bash
      run: npx playwright install chromium

    - name: Run visual regression tests
      shell: bash
      run: npx snapdiff-cli diff -t ${{ inputs.threshold }} 
